<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; img-src 'self' data:;" />
<title>HTML2EXE</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="window">
    <header class="titlebar">
      <div class="titlebar-drag">
        <span class="brand-mark">H2E</span>
        <span class="brand" data-i18n="appTitle">HTML2EXE</span>
        <span class="status-glyph" id="status-glyph"><span class="g-ring"></span></span>
      </div>
      <div class="titlebar-controls">
        <button type="button" class="icon-btn help-btn" id="help-toggle" title="Help">?</button>
        <button type="button" class="icon-btn" id="theme-toggle" title="Toggle theme">
          <svg id="theme-icon-dark" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="4.5"/><path d="M12 2.5v2.5M12 19v2.5M4.2 4.2l1.8 1.8M18 18l1.8 1.8M2.5 12H5M19 12h2.5M4.2 19.8L6 18M18 6l1.8-1.8"/></svg>
          <svg id="theme-icon-light" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" hidden><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z"/></svg>
        </button>
        <button type="button" class="icon-btn lang-btn" id="lang-toggle">
          <span data-i18n-lang-label>FA</span>
        </button>
        <button type="button" class="icon-btn" id="minimize-btn" title="Minimize">
          <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="5.4" width="10" height="1.2" fill="currentColor"/></svg>
        </button>
        <button type="button" class="icon-btn close-btn" id="close-btn" title="Close">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.3"/></svg>
        </button>
      </div>
    </header>

    <div class="body">
      <main class="content">
        <div class="content-scroll">
          <section class="field-group" id="drop-zone">
            <label data-i18n="sectionInput"></label>
            <div class="field-row">
              <input type="text" id="input-path" readonly data-i18n-attr-placeholder="inputPlaceholder" />
              <button type="button" class="btn" id="pick-input" data-i18n="browse"></button>
            </div>
            <p class="hint" data-i18n="dropHint"></p>
          </section>

          <section class="field-group">
            <label data-i18n="sectionName"></label>
            <div class="field-row">
              <input type="text" id="app-name" data-i18n-attr-placeholder="namePlaceholder" />
            </div>
          </section>

          <section class="field-group">
            <label data-i18n="sectionIcon"></label>
            <div class="field-row">
              <input type="text" id="icon-path" readonly data-i18n-attr-placeholder="iconPlaceholder" />
              <button type="button" class="btn" id="pick-icon" data-i18n="pickIcon"></button>
              <button type="button" class="btn ghost" id="clear-icon" data-i18n="clear"></button>
            </div>
          </section>

          <section class="field-group">
            <label data-i18n="sectionOutput"></label>
            <div class="field-row">
              <input type="text" id="output-path" readonly />
              <button type="button" class="btn" id="pick-output" data-i18n="browse"></button>
            </div>
          </section>

          <div class="field-error" id="field-error"></div>

          <button type="button" class="btn primary build-btn" id="build-btn">
            <span class="spinner" id="build-spinner" hidden></span>
            <span id="build-btn-label" data-i18n="buildBtn"></span>
          </button>

          <section class="banner success" id="success-banner" hidden>
            <div class="banner-title" data-i18n="successTitle"></div>
            <div class="exe-path" id="exe-path" dir="ltr"></div>
            <div class="banner-actions">
              <button type="button" class="btn" id="show-exe-btn" data-i18n="showExe"></button>
              <button type="button" class="btn ghost" id="build-another-btn" data-i18n="buildAnother"></button>
            </div>
          </section>

          <section class="banner error" id="error-banner" hidden>
            <div class="banner-title" data-i18n="errorTitle"></div>
            <div class="hint" data-i18n="errorHint"></div>
            <button type="button" class="btn ghost" id="build-another-error-btn" data-i18n="buildAnother"></button>
          </section>
        </div>

        <footer class="statusbar">
          <span class="status-text" id="status-text" data-i18n="statusIdle"></span>
          <button type="button" class="pill-btn" id="open-output-btn" data-i18n="openFolder"></button>
        </footer>
      </main>

      <aside class="rail">
        <button type="button" class="rail-new-btn" id="new-build-btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          <span data-i18n="newBuild"></span>
        </button>

        <div class="rail-label">
          <span data-i18n="recentHeading"></span>
          <span class="count-badge" id="recent-count">0</span>
        </div>
        <div class="recent-list" id="recent-list">
          <p class="recent-empty" id="recent-empty" data-i18n="recentEmpty"></p>
        </div>

        <div class="rail-label" data-i18n="logHeading"></div>
        <section class="log-panel" id="log-panel">
          <pre id="log-output"></pre>
        </section>
      </aside>

      <div class="help-overlay" id="help-overlay">
        <div class="help-panel">
          <div class="help-panel-head">
            <h3 data-i18n="helpTitle"></h3>
            <button type="button" class="icon-btn" id="help-close">
              <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.3"/></svg>
            </button>
          </div>
          <ul>
            <li data-i18n="helpItem1"></li>
            <li data-i18n="helpItem2"></li>
            <li data-i18n="helpItem3"></li>
            <li data-i18n="helpItem4"></li>
          </ul>
          <div class="help-credit">
            <span dir="ltr" data-i18n="footer"></span><span dir="ltr"> · Telegram: Fast_Amozesh</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
